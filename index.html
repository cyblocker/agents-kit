<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingress Orion Season Planner</title>
    <link rel="icon" type="svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#060a0f">

    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ingress Planner">
    <link rel="apple-touch-icon" href="app-icon.png">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CR66W0QW5R"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-CR66W0QW5R');
    </script>

    <script src="core.min.js" defer></script>
    <link rel="stylesheet" href="utilities.css">
</head>

<body class="p-4 md:p-8">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KL22WN" height="0" width="0"
            style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div class="max-w-5xl mx-auto">
        <!-- Brand & Nav -->
        <nav class="flex justify-between items-center mb-8 px-2 pt-4">
            <div class="text-[12px] text-slate-300/80 font-mono tracking-[0.4em] uppercase select-none">/ AgentsKit /
            </div>
            <div class="flex items-center gap-2">
                <select id="season-selector"
                    class="bg-transparent text-slate-600 text-[10px] border border-slate-800 rounded px-1 py-0.5"
                    style="display:none;" onchange="switchSeason(this.value)"></select>
                <div class="lang-toggle" id="lang-toggle">
                    <button class="lang-btn active" data-lang="zh">中文</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="ja">日本語</button>
                </div>
            </div>
        </nav>

        <!-- Sync Banner (Only shown if no data) -->
        <div id="sync-banner" style="display:none;"
            class="bg-blue-900/40 border border-blue-500 rounded-xl p-6 mb-8 text-center shadow-[0_0_20px_rgba(59,130,246,0.2)] relative z-20">
            <button onclick="dismissBanner()"
                class="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            <h2 id="mig-banner-title" class="text-2xl font-bold text-white mb-2"></h2>
            <p id="mig-banner-desc" class="text-slate-300 mb-6"></p>
            <div class="flex flex-col sm:flex-row justify-center items-center gap-4">
                <button onclick="window.location.href='https://cyblocker.com/ingress/?request_export=true'"
                    class="btn-primary px-8 py-3 text-lg font-bold bg-green-600 hover:bg-green-700 shadow-[0_0_15px_rgba(34,197,94,0.4)]">
                    <span id="btn-sync-legacy-banner"></span>
                </button>
                <button onclick="manualImportData()" class="btn-outline px-8 py-3 text-lg">
                    <span id="btn-manual-import-banner"></span>
                </button>
            </div>
        </div>

        <!-- Header -->
        <header class="mb-8 text-center relative z-20">
            <h1 id="page-title" class="text-4xl font-bold accent-blue mb-2 tracking-wider"></h1>
            <p id="page-subtitle" class="text-slate-400"></p>
        </header>

        <!-- Placeholder View -->
        <div id="placeholder-view" style="display:none;" class="text-center py-20">
            <h2 id="ph-title" class="text-3xl sm:text-4xl font-bold mb-4 accent-blue"></h2>
            <p id="ph-desc" class="text-slate-400 mb-8"></p>
            <div id="ph-seasons" class="flex flex-col gap-3 max-w-sm mx-auto"></div>
        </div>

        <div id="tracker-view">
            <!-- Main Input & Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                <div class="ingress-card p-4 rounded-xl text-center total-input-box">
                    <div id="label-input-total" class="text-blue-400 text-sm font-bold mb-2 uppercase"></div>
                    <input type="number" id="global-total-actual"
                        class="text-2xl font-bold bg-transparent border-none text-center focus:ring-0 w-full"
                        placeholder="" value="0" oninput="updateGlobalTotal(this.value)"
                        onchange="updateGlobalTotal(this.value)">
                    <div id="label-input-hint" class="text-[10px] text-slate-500 mt-1"></div>
                </div>
                <div class="ingress-card p-4 rounded-xl text-center">
                    <div id="label-planned-range" class="text-slate-400 text-sm mb-1"></div>
                    <div id="planned-total-range" class="text-xl md:text-2xl font-bold accent-blue">0 - 0</div>
                    <div id="planned-status" class="text-xs text-slate-500 mt-1"></div>
                </div>
                <div class="ingress-card p-4 rounded-xl text-center">
                    <div id="label-next-tier" class="text-slate-400 text-sm mb-1"></div>
                    <div id="next-tier-diff" class="text-3xl font-bold accent-purple">0</div>
                    <div id="next-tier-name" class="text-xs text-slate-500 mt-1"></div>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="ingress-card p-6 rounded-xl mb-8">
                <div id="badge-container"
                    class="relative h-20 mb-4 font-semibold uppercase tracking-widest badge-label-container">
                    <!-- Dynamically populated -->
                </div>
                <div id="progress-bar-container" class="progress-bar-container">
                    <!-- Markers are dynamically populated -->
                    <div id="main-progress-bar" class="progress-fill" style="width: 0%"></div>
                </div>
            </div>

            <!-- Card Generation -->
            <div id="card-module" class="ingress-card p-6 rounded-xl mb-8">
                <h2 id="label-card" class="text-lg font-bold accent-purple mb-2 flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <span id="text-card-module"></span>
                </h2>
                <p id="card-motivation" class="text-sm text-slate-400 mb-4"></p>
                <div class="flex flex-col md:flex-row gap-4 items-center">
                    <input type="text" id="agent-name-input"
                        class="bg-slate-800 border border-slate-600 rounded px-3 py-2 text-white w-full md:w-auto"
                        placeholder="Agent Name">
                    <select id="card-theme-select"
                        class="bg-slate-800 border border-slate-600 rounded px-3 py-2 text-white w-full md:w-auto">
                        <option value="theme-default" id="opt-theme-default">Default (Dark)</option>
                        <option value="theme-res" id="opt-theme-res">Resistance (Blue)</option>
                        <option value="theme-enl" id="opt-theme-enl">Enlightened (Green)</option>
                    </select>
                    <button onclick="generateCard()"
                        class="btn-primary w-full md:w-auto flex justify-center items-center" id="btn-generate-card">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        <span>Generate</span>
                    </button>
                </div>
            </div>

            <!-- Activity Table -->
            <div class="ingress-card rounded-xl overflow-hidden mb-8">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-800/50">
                            <tr>
                                <th id="th-activity"
                                    class="p-4 text-sm font-semibold text-slate-300 min-w-[120px] sm:min-w-[140px]">
                                </th>
                                <th id="th-max" class="p-4 text-sm font-semibold text-slate-300 hide-on-narrow"></th>
                                <th id="th-planned" class="p-4 text-sm font-semibold text-slate-300"></th>
                                <th id="th-actual" class="p-4 text-sm font-semibold text-slate-300"></th>
                                <th id="th-updated" class="p-4 text-sm font-semibold text-slate-300 hide-on-mobile">
                                </th>
                            </tr>
                        </thead>
                        <tbody id="activity-body">
                            <!-- Rows -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div> <!-- End tracker-view -->

        <!-- Data Migration -->
        <div class="ingress-card p-6 rounded-xl mb-8">
            <h2 id="label-migration" class="text-lg font-bold accent-blue mb-4 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                </svg>
                <span id="text-migration"></span>
            </h2>
            <div id="migration-sync-options" class="flex flex-wrap gap-3 mb-4 border-b border-slate-700 pb-4">
                <button onclick="window.location.href='https://cyblocker.com/ingress/?request_export=true'"
                    id="btn-sync-legacy"
                    class="btn-primary flex items-center bg-green-600 hover:bg-green-700 shadow-[0_0_15px_rgba(34,197,94,0.4)]">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    <span>Sync from Legacy Site</span>
                </button>
                <button id="btn-manual-import-card" onclick="manualImportData()" class="btn-outline flex items-center">
                    <span id="btn-manual-import-card-text"></span>
                </button>
            </div>
            <div class="flex flex-wrap gap-3">
                <button onclick="showShareModal()" class="btn-primary flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                    </svg>
                    <span id="btn-share-url"></span>
                </button>
                <button onclick="exportDataToFile()" class="btn-outline flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    <span id="btn-export-json"></span>
                </button>
                <label class="btn-outline flex items-center cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                    <span id="btn-import-json"></span>
                    <input type="file" id="import-file" class="hidden" accept=".json"
                        onchange="importDataFromFile(event)">
                </label>
            </div>
        </div>

        <!-- Share Modal -->
        <div id="shareModal" class="modal">
            <div class="modal-content ingress-card">
                <h3 id="modal-share-title" class="text-xl font-bold accent-blue mb-2"></h3>
                <p id="modal-share-desc" class="text-slate-400 text-sm mb-4"></p>
                <div id="qrcode"></div>
                <div id="share-url" class="share-url-box"></div>
                <div class="flex gap-2 justify-center">
                    <button onclick="copyShareUrl()" id="btn-copy-url" class="btn-primary text-sm"></button>
                    <button onclick="closeModal('shareModal')" id="btn-close-modal"
                        class="btn-outline text-sm"></button>
                </div>
            </div>
        </div>

        <!-- Card Modal -->
        <div id="cardModal" class="modal">
            <div class="modal-content ingress-card" style="max-width: 450px;">
                <h3 id="modal-card-title" class="text-xl font-bold accent-purple mb-2"></h3>
                <p id="modal-card-desc" class="text-slate-400 text-sm mb-4"></p>
                <div id="card-preview-container" class="mb-6"></div>
                <div class="flex gap-2 justify-center">
                    <button onclick="closeModal('cardModal')" id="btn-close-card" class="btn-outline text-sm"></button>
                </div>
            </div>
        </div>

        <!-- Hidden Card Template -->
        <div id="card-template" class="theme-default">
            <div class="card-title">
                <div class="card-title-l1" id="ct-title-l1"></div>
                <div class="card-title-l2" id="ct-title-l2"></div>
            </div>
            <div class="card-agent" id="ct-agent">AGENT</div>
            <div class="card-congrats" id="ct-congrats"></div>
            <img src="" class="card-badge" id="ct-badge" style="display:none;">
            <div class="card-score" id="ct-score">0</div>
            <div class="card-stats">
                <div class="stat-box">
                    <div class="stat-label" id="ctl-bounties">Bounties</div>
                    <div class="stat-value" id="ct-bounties">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label" id="ctl-ifs">IFS</div>
                    <div class="stat-value" id="ct-ifs">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label" id="ctl-events">Events & Ops</div>
                    <div class="stat-value" id="ct-events">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label" id="ctl-anomaly">Anomaly</div>
                    <div class="stat-value" id="ct-anomaly">0</div>
                </div>
            </div>
            <div class="card-footer">
                <div id="ct-footer-text">GENERATED BY INGRESS SEASON PLANNER</div>
                <div class="card-footer-url">AgentsKit.org</div>
            </div>
        </div>

        <footer class="text-center text-slate-500 text-sm mb-12">
            <p id="footer-source"></p>
            <p id="footer-formula" class="mt-2 opacity-50"></p>
            <div class="mt-6 pt-6 border-t border-slate-800/40 max-w-xs mx-auto">
                <span id="label-contact"></span>
                <a id="email-link" href="#" class="accent-blue hover:underline font-mono ml-1"></a>
            </div>
        </footer>
    </div>
</body>

</html>
