<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingress Orion Season Planner</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <!-- Google Tag Manager -->
    <script>(function (w, d, s, l, i) {

                'gtm.start':
                    new Date().getTime(), event: 'gtm.js'
            }); var f = d.getElementsByTagName(s)[0],
                j = d.createElement(s), dl = l != 'dataLayer' ? '&l=' + l : ''; j.async = true; j.src =
                    'https://www.googletagmanager.com/gtm.js?id=' + i + dl; f.parentNode.insertBefore(j, f);
        })(window, document, 'script', 'dataLayer', 'GTM-KL22WN');</script>
    <!-- End Google Tag Manager -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Exo 2', sans-serif;
            background-color: #060a0f;
            color: #e2e8f0;
            background-image: radial-gradient(circle at 50% 50%, #101827 0%, #060a0f 100%);
            min-height: 100vh;
        }

        .ingress-card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #1e293b;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .accent-blue {
            color: #60a5fa;
            text-shadow: 0 0 10px rgba(96, 165, 250, 0.5);
        }

        .accent-green {
            color: #4ade80;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
        }

        .accent-purple {
            color: #a78bfa;
            text-shadow: 0 0 10px rgba(167, 139, 250, 0.5);
        }

        .accent-orange {
            color: #fb923c;
            text-shadow: 0 0 10px rgba(251, 146, 60, 0.5);
        }

        .progress-bar-container {
            height: 12px;
            background: #1e293b;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            transition: width 0.5s ease-in-out;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            box-shadow: 0 0 10px rgba(96, 165, 250, 0.8);
        }

        .badge-marker {
            position: absolute;
            top: -4px;
            width: 2px;
            height: 20px;
            background: #fff;
            z-index: 10;
        }

        input[type="number"] {
            background: #0f172a;
            border: 1px solid #334155;
            color: #f8fafc;
            padding: 6px 12px;
            border-radius: 4px;
            width: 100%;
            max-width: 180px;
        }

        input:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 5px rgba(96, 165, 250, 0.5);
        }

        .timestamp {
            font-size: 0.7rem;
            color: #64748b;
        }

        .bounty-hint {
            font-size: 0.75rem;
            color: #fb923c;
            margin-top: 4px;
        }

        .total-input-box {
            border: 2px solid #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }

        .lang-toggle {
            display: inline-flex;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #334155;
        }

        .lang-btn {
            padding: 4px 12px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: #94a3b8;
            border: none;
            transition: all 0.2s ease;
            letter-spacing: 0.05em;
        }

        .lang-btn:hover {
            color: #e2e8f0;
            background: rgba(96, 165, 250, 0.15);
        }

        .lang-btn.active {
            background: rgba(96, 165, 250, 0.25);
            color: #60a5fa;
            text-shadow: 0 0 8px rgba(96, 165, 250, 0.4);
        }

        /* Responsive Fixes */
        @media (max-width: 640px) {
            .badge-label-container {
                height: 120px !important;
            }

            .badge-item:nth-child(even) {
                top: 60px !important;
            }

            .hide-on-mobile {
                display: none;
            }

            input[type="number"] {
                min-width: 70px;
                padding: 4px 8px;
                font-size: 0.875rem;
            }

            .total-input-box input[type="number"] {
                min-width: 150px;
                font-size: 1.5rem;
            }

            .progress-bar-container {
                margin-top: 10px;
            }
        }

        /* QR Code Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            overflow-y: auto;
            padding: 20px 0;
        }

        .modal-content {
            background: #0f172a;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #1e293b;
            width: 95%;
            max-width: 400px;
            border-radius: 12px;
            text-align: center;
            position: relative;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        #qrcode img {
            border: 8px solid white;
            border-radius: 4px;
        }

        .share-url-box {
            background: #060a0f;
            border: 1px solid #334155;
            padding: 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            word-break: break-all;
            margin-bottom: 15px;
            color: #94a3b8;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: #2563eb;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        .btn-outline {
            border: 1px solid #334155;
            color: #cbd5e1;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            border-color: #60a5fa;
            color: #60a5fa;
            background: rgba(96, 165, 250, 0.1);
        }

        /* Card Template Styles */
        #card-template {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 600px;
            height: 1000px;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            font-family: 'Exo 2', sans-serif;
        }

        .theme-default {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        .theme-res {
            background: linear-gradient(135deg, #020617 0%, #1e3a8a 100%);
            border: 2px solid #3b82f6;
        }

        .theme-enl {
            background: linear-gradient(135deg, #022c22 0%, #14532d 100%);
            border: 2px solid #22c55e;
        }

        .card-title {
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
            color: #cbd5e1;
        }

        .card-title-l1 {
            font-size: 20px;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .card-title-l2 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .card-agent {
            font-size: 48px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .theme-res .card-agent {
            color: #60a5fa;
            text-shadow: 0 0 20px rgba(96, 165, 250, 0.8);
        }

        .theme-enl .card-agent {
            color: #4ade80;
            text-shadow: 0 0 20px rgba(74, 222, 128, 0.8);
        }

        .card-badge {
            width: 160px;
            height: 160px;
            margin-bottom: 5px;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.2));
            object-fit: contain;
        }

        .card-score {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 30px;
            font-family: 'Exo 2', sans-serif;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .card-congrats {
            font-size: 18px;
            font-weight: 600;
            color: #fbbf24;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .card-stats {
            width: 100%;
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-content: start;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-label {
            font-size: 18px;
            color: #94a3b8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 600;
        }

        .stat-pct {
            display: block;
            font-size: 16px;
            color: #94a3b8;
            margin-top: 4px;
            font-weight: normal;
        }

        .card-footer {
            font-size: 14px;
            color: #64748b;
            margin-top: auto;
            text-align: center;
            letter-spacing: 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-footer-url {
            font-size: 16px;
            opacity: 1;
            margin-top: 8px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #cbd5e1;
        }

        #card-preview-container img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body class="p-4 md:p-8">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KL22WN" height="0" width="0"
            style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center">
            <div class="flex justify-end mb-4">
                <div class="lang-toggle" id="lang-toggle">
                    <button class="lang-btn active" data-lang="zh">中文</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="ja">日本語</button>
                </div>
            </div>
            <h1 id="page-title" class="text-4xl font-bold accent-blue mb-2 tracking-wider"></h1>
            <p id="page-subtitle" class="text-slate-400"></p>
        </header>

        <!-- Main Input & Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="ingress-card p-4 rounded-xl text-center total-input-box">
                <div id="label-input-total" class="text-blue-400 text-sm font-bold mb-2 uppercase"></div>
                <input type="number" id="global-total-actual"
                    class="text-2xl font-bold bg-transparent border-none text-center focus:ring-0 w-full" placeholder=""
                    value="0" onchange="updateGlobalTotal(this.value)">
                <div id="label-input-hint" class="text-[10px] text-slate-500 mt-1"></div>
            </div>
            <div class="ingress-card p-4 rounded-xl text-center">
                <div id="label-planned-range" class="text-slate-400 text-sm mb-1"></div>
                <div id="planned-total-range" class="text-xl md:text-2xl font-bold accent-blue">0 - 0</div>
                <div id="planned-status" class="text-xs text-slate-500 mt-1"></div>
            </div>
            <div class="ingress-card p-4 rounded-xl text-center">
                <div id="label-next-tier" class="text-slate-400 text-sm mb-1"></div>
                <div id="next-tier-diff" class="text-3xl font-bold accent-purple">0</div>
                <div id="next-tier-name" class="text-xs text-slate-500 mt-1"></div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="ingress-card p-6 rounded-xl mb-8">
            <div class="relative h-20 mb-4 font-semibold uppercase tracking-widest badge-label-container">
                <!-- Bronze -->
                <div class="absolute text-center transition-all duration-300 badge-item"
                    style="left: 20%; transform: translateX(-50%); top: 0;">
                    <img src="static/orion/bronze.png"
                        class="w-10 h-10 mx-auto drop-shadow-[0_0_5px_rgba(205,127,50,0.5)]" alt="Bronze">
                    <span class="text-[10px] whitespace-nowrap mt-1 block">Bronze (5k)</span>
                </div>
                <!-- Silver -->
                <div class="absolute text-center transition-all duration-300 badge-item"
                    style="left: 32%; transform: translateX(-50%); top: 0;">
                    <img src="static/orion/silver.png"
                        class="w-10 h-10 mx-auto drop-shadow-[0_0_5px_rgba(192,192,192,0.5)]" alt="Silver">
                    <span class="text-[10px] whitespace-nowrap mt-1 block">Silver (8k)</span>
                </div>
                <!-- Gold -->
                <div class="absolute text-center transition-all duration-300 badge-item"
                    style="left: 60%; transform: translateX(-50%); top: 0;">
                    <img src="static/orion/gold.png" class="w-10 h-10 mx-auto drop-shadow-[0_0_5px_rgba(255,215,0,0.5)]"
                        alt="Gold">
                    <span class="text-[10px] whitespace-nowrap mt-1 block">Gold (15k)</span>
                </div>
                <!-- Platinum -->
                <div class="absolute text-center transition-all duration-300 badge-item"
                    style="left: 100%; transform: translateX(-100%); top: 0;">
                    <img src="static/orion/platinum.png"
                        class="w-10 h-10 mx-auto drop-shadow-[0_0_5px_rgba(229,228,226,0.5)]" alt="Platinum">
                    <span class="text-[10px] whitespace-nowrap mt-1 block">Platinum (25k)</span>
                </div>
            </div>
            <div class="progress-bar-container">
                <div class="badge-marker" style="left: 20%;"></div>
                <div class="badge-marker" style="left: 32%;"></div>
                <div class="badge-marker" style="left: 60%;"></div>
                <div class="badge-marker" style="left: 100%;"></div>
                <div id="main-progress-bar" class="progress-fill" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <!-- Card Generation -->
    <div class="ingress-card p-6 rounded-xl mb-8">
        <h2 id="label-card" class="text-lg font-bold accent-purple mb-2 flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <span id="text-card-module"></span>
        </h2>
        <p id="card-motivation" class="text-sm text-slate-400 mb-4"></p>
        <div class="flex flex-col md:flex-row gap-4 items-center">
            <input type="text" id="agent-name-input"
                class="bg-slate-800 border border-slate-600 rounded px-3 py-2 text-white w-full md:w-auto"
                placeholder="Agent Name">
            <select id="card-theme-select"
                class="bg-slate-800 border border-slate-600 rounded px-3 py-2 text-white w-full md:w-auto">
                <option value="theme-default" id="opt-theme-default">Default (Dark)</option>
                <option value="theme-res" id="opt-theme-res">Resistance (Blue)</option>
                <option value="theme-enl" id="opt-theme-enl">Enlightened (Green)</option>
            </select>
            <button onclick="generateCard()" class="btn-primary w-full md:w-auto flex justify-center items-center"
                id="btn-generate-card">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                <span>Generate</span>
            </button>
        </div>
    </div>

    <!-- Activity Table -->
    <div class="ingress-card rounded-xl overflow-hidden mb-8">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-800/50">
                    <tr>
                        <th id="th-activity" class="p-4 text-sm font-semibold text-slate-300 min-w-[140px]"></th>
                        <th id="th-max" class="p-4 text-sm font-semibold text-slate-300"></th>
                        <th id="th-planned" class="p-4 text-sm font-semibold text-slate-300"></th>
                        <th id="th-actual" class="p-4 text-sm font-semibold text-slate-300"></th>
                        <th id="th-updated" class="p-4 text-sm font-semibold text-slate-300 hide-on-mobile"></th>
                    </tr>
                </thead>
                <tbody id="activity-body">
                    <!-- Rows -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Data Migration -->
    <div class="ingress-card p-6 rounded-xl mb-8">
        <h2 id="label-migration" class="text-lg font-bold accent-blue mb-4 flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
            </svg>
            <span id="text-migration"></span>
        </h2>
        <div class="flex flex-wrap gap-3">
            <button onclick="showShareModal()" class="btn-primary flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                </svg>
                <span id="btn-share-url"></span>
            </button>
            <button onclick="exportDataToFile()" class="btn-outline flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                <span id="btn-export-json"></span>
            </button>
            <label class="btn-outline flex items-center cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                </svg>
                <span id="btn-import-json"></span>
                <input type="file" id="import-file" class="hidden" accept=".json" onchange="importDataFromFile(event)">
            </label>
        </div>
    </div>

    <!-- Share Modal -->
    <div id="shareModal" class="modal">
        <div class="modal-content ingress-card">
            <h3 id="modal-share-title" class="text-xl font-bold accent-blue mb-2"></h3>
            <p id="modal-share-desc" class="text-slate-400 text-sm mb-4"></p>
            <div id="qrcode"></div>
            <div id="share-url" class="share-url-box"></div>
            <div class="flex gap-2 justify-center">
                <button onclick="copyShareUrl()" id="btn-copy-url" class="btn-primary text-sm"></button>
                <button onclick="closeModal('shareModal')" id="btn-close-modal" class="btn-outline text-sm"></button>
            </div>
        </div>
    </div>

    <!-- Card Modal -->
    <div id="cardModal" class="modal">
        <div class="modal-content ingress-card" style="max-width: 450px;">
            <h3 id="modal-card-title" class="text-xl font-bold accent-purple mb-2"></h3>
            <p id="modal-card-desc" class="text-slate-400 text-sm mb-4"></p>
            <div id="card-preview-container" class="mb-6"></div>
            <div class="flex gap-2 justify-center">
                <button onclick="closeModal('cardModal')" id="btn-close-card" class="btn-outline text-sm"></button>
            </div>
        </div>
    </div>

    <!-- Hidden Card Template -->
    <div id="card-template" class="theme-default">
        <div class="card-title">
            <div class="card-title-l1">Ingress 2026 Q2</div>
            <div class="card-title-l2">Orion Anomaly Season</div>
        </div>
        <div class="card-agent" id="ct-agent">AGENT</div>
        <div class="card-congrats" id="ct-congrats"></div>
        <img src="" class="card-badge" id="ct-badge" style="display:none;">
        <div class="card-score" id="ct-score">0</div>
        <div class="card-stats">
            <div class="stat-box">
                <div class="stat-label" id="ctl-bounties">Bounties</div>
                <div class="stat-value" id="ct-bounties">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label" id="ctl-ifs">IFS</div>
                <div class="stat-value" id="ct-ifs">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label" id="ctl-events">Events & Ops</div>
                <div class="stat-value" id="ct-events">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label" id="ctl-anomaly">Anomaly</div>
                <div class="stat-value" id="ct-anomaly">0</div>
            </div>
        </div>
        <div class="card-footer">

        function detectLanguage() {
            const saved = localStorage.getItem('ingress_orion_lang');
            if (saved) return saved;

            const browserLangs = navigator.languages || [navigator.language];
            for (const lang of browserLangs) {
                const short = lang.split('-')[0].toLowerCase();
                if (I18N[short]) return short;
            }
            return 'en';
        }

        function formatTimeRemaining(ms) {
            const totalMinutes = Math.floor(ms / (1000 * 60));
            const totalHours = Math.floor(totalMinutes / 60);
            const days = Math.floor(totalHours / 24);
            const hours = totalHours % 24;
            const mins = totalMinutes % 60;

            if (days > 0) {
                return `${days}${t('unitDay')} ${hours}${t('unitHour')} ${mins}${t('unitMinute')}`;
            } else if (hours > 0) {
                return `${hours}${t('unitHour')} ${mins}${t('unitMinute')}`;
            } else {
                return `${mins}${t('unitMinute')}`;
            }
        }

        function getRemainingBountyPotential() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);

            if (tomorrow > SEASON_END) return 0;
            const diffDays = Math.ceil((SEASON_END - tomorrow) / (1000 * 60 * 60 * 24));
            return Math.max(0, diffDays) * 80;
        }

            const email = parts.map(c => String.fromCharCode(c)).join('');
            el.href = 'mailto:' + email;
            el.textContent = email;
        }

            const tbody = document.getElementById('activity-body');
            tbody.innerHTML = '';
            const potential = getRemainingBountyPotential();

            let otherActualSum = 0;
            ACTIVITIES.forEach(act => {
                if (!act.isBounty) {
                    otherActualSum += (userData.activities[act.id]?.actual || 0);
                }
            });

            const calculatedBounty = Math.max(0, userData.globalTotal - otherActualSum);

            ACTIVITIES.forEach(act => {
                const stored = userData.activities[act.id] || { planned: 0, actual: 0, lastUpdate: '-' };

                row.className = 'border-t border-slate-800 hover:bg-slate-800/30 transition-colors';

                let plannedInput = '';
                let actualInput = '';
                let hint = '';

                // Build description
                let displayDesc = act.descKey ? t(act.descKey) : '';
                if (act.utcStart && act.utcEnd) {
                    const start = new Date(act.utcStart);
                    const end = new Date(act.utcEnd);
                    const now = new Date();
                    const fmt = { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false };

                    if (now < start) {
                        const diff = start - now;
                        statusBadge = `<div class="mt-1 text-[10px] text-cyan-400 font-semibold uppercase tracking-wider">${t('startsIn')(formatTimeRemaining(diff))}</div>`;
                    } else if (now < end) {
                        const diff = end - now;
                        statusBadge = `<div class="mt-1 text-[10px] text-amber-400 font-semibold uppercase tracking-wider animate-pulse">${t('endsIn')(formatTimeRemaining(diff))}</div>`;
                    } else {
                        statusBadge = `<div class="mt-1 text-[10px] text-rose-500 font-semibold uppercase tracking-wider opacity-70">${t('ended')}</div>`;
                    }
                    displayDesc += statusBadge;
                }

                if (act.isBounty) {
                    plannedInput = `<span class="text-slate-600 italic text-sm">${t('seeRange')}</span>`;
                    actualInput = `
                        <div class="flex flex-col">
                            <span class="text-green-400 font-mono font-bold text-lg">${calculatedBounty}</span>
                            <div class="text-[10px] text-slate-500 mt-1">${t('daysCompleted')(Math.floor(calculatedBounty / 80))}</div>
                        </div>
                    `;
                    hint = `<div class="bounty-hint">${t('bountyHint')(potential)}</div>`;
                } else {
                    plannedInput = `
                        <input type="number" min="0" max="${act.max}" value="${stored.planned}" 
                               onchange="updateValue('${act.id}', 'planned', this.value)">
                    `;
                    actualInput = `
                        <input type="number" min="0" max="${act.max}" value="${stored.actual}" 
                               onchange="updateValue('${act.id}', 'actual', this.value)">
                    `;
                }

                const displayMax = (act.id === 'anomaly') ? t('max_anomaly') : act.max;

                row.innerHTML = `
                    <td class="p-4">
                        <div class="font-semibold text-slate-200 text-sm sm:text-base">${t(act.nameKey)}</div>
                        <div class="text-[10px] sm:text-xs text-slate-500">${displayDesc}</div>
                        ${hint}
                    </td>
                    <td class="p-4 text-slate-400 font-mono text-xs sm:text-sm">${displayMax}</td>
                    <td class="p-4">${plannedInput}</td>
                    <td class="p-4">${actualInput}</td>
                    <td class="p-4 hide-on-mobile">
                        <div id="time-${act.id}" class="timestamp font-mono">${stored.lastUpdate}</div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        window.updateGlobalTotal = function (val) {
            userData.globalTotal = parseInt(val) || 0;
            saveAndRefresh();
        }

        window.updateValue = function (id, type, value) {
            if (!userData.activities[id]) {
                userData.activities[id] = { planned: 0, actual: 0, lastUpdate: '-' };
            }

            userData.activities[id][type] = parseInt(value) || 0;

            const now = new Date();
            userData.activities[id].lastUpdate = now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            saveAndRefresh();
        };

        function saveAndRefresh() {
            allSeasonsData[CURRENT_SEASON_ID] = userData;
            localStorage.setItem(GLOBAL_STORAGE_KEY, JSON.stringify(allSeasonsData));
            renderTable();
            calculate();
        }

        function calculate() {
            let totalActual = userData.globalTotal;
            let otherPlannedSum = 0;

            ACTIVITIES.forEach(act => {
                if (!act.isBounty) {
                    const stored = userData.activities[act.id] || { planned: 0, actual: 0 };
                    let valToUse = stored.planned;

                    const now = new Date();
                    const hasEnded = act.utcEnd && now > new Date(act.utcEnd);

                    // If actual > planned, use actual.
                    // If activity ended, use actual regardless of planned.
                    if (stored.actual > stored.planned || hasEnded) {
                        valToUse = stored.actual;
                    }

                    otherPlannedSum += valToUse;
                }
            });

            const potential = getRemainingBountyPotential();

            let otherActualSum = 0;
            ACTIVITIES.forEach(act => { if (!act.isBounty) otherActualSum += (userData.activities[act.id]?.actual || 0); });
            const currentBountyActual = Math.max(0, totalActual - otherActualSum);

            const plannedMin = otherPlannedSum + currentBountyActual;
            const plannedMax = plannedMin + potential;

            document.getElementById('planned-total-range').innerText = `${plannedMin.toLocaleString()} - ${plannedMax.toLocaleString()}`;

            let nextTier = TIERS.find(t => t.value > totalActual);
            const nextDiffEl = document.getElementById('next-tier-diff');
            if (!nextTier) {
                nextDiffEl.innerText = 'MAX';
                document.getElementById('next-tier-name').innerText = t('reachedPlatinum');
                nextDiffEl.className = 'text-3xl font-bold accent-green';
            } else {
                const diff = nextTier.value - totalActual;
                nextDiffEl.innerText = diff.toLocaleString();
                document.getElementById('next-tier-name').innerText = t('toTier')(nextTier.name);
                nextDiffEl.className = 'text-3xl font-bold accent-purple';
            }

            let plannedTierMax = [...TIERS].reverse().find(tier => tier.value <= plannedMax);
            document.getElementById('planned-status').innerText = plannedTierMax ? t('maxTierForecast')(plannedTierMax.name) : t('noTierForecast');

            const progressPercent = Math.min((totalActual / 25000) * 100, 100);
            document.getElementById('main-progress-bar').style.width = progressPercent + '%';

            // Motivation Message for Card
            let earnedTier = [...TIERS].reverse().find(t => totalActual >= t.value);
            if (earnedTier) {
                document.getElementById('card-motivation').innerHTML = t('motivationBadge')(earnedTier.name) + ' 🎉';
            } else {
                document.getElementById('card-motivation').innerHTML = t('motivationNormal');
            }
        }

        // ==================== MIGRATION LOGIC ====================
        let qrcode = null;

        function showShareModal() {
            const data = {
                v: 4,
                currentSeasonId: CURRENT_SEASON_ID,
                lang: currentLang,
                allSeasons: allSeasonsData
            };
            const jsonStr = JSON.stringify(data);
            const compressedData = LZString.compressToEncodedURIComponent(jsonStr);
            const url = window.location.origin + window.location.pathname + '#data=' + compressedData;

            document.getElementById('share-url').textContent = url;
            document.getElementById('shareModal').style.display = 'block';

            if (qrcode) {
                qrcode.clear();
                qrcode.makeCode(url);
            } else {
                qrcode = new QRCode(document.getElementById("qrcode"), {
                    text: url,
                    width: 200,
                    height: 200,
                    colorDark: "#0f172a",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            }
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        function copyShareUrl() {
            const url = document.getElementById('share-url').textContent;
            navigator.clipboard.writeText(url).then(() => {
                alert(t('copySuccess'));
            });
        }

        function exportDataToFile() {
            const data = {
                v: 4,
                currentSeasonId: CURRENT_SEASON_ID,
                lang: currentLang,
                allSeasons: allSeasonsData
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ingress_all_seasons_${new Date().toISOString().slice(0, 10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importDataFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const data = JSON.parse(e.target.result);
                    processImport(data);
                } catch (err) {
                    alert(t('invalidData'));
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // Reset input
        }

        function checkHashData() {
            const hash = window.location.hash;
            if (hash.startsWith('#data=')) {
                const dataStr = hash.substring(6);
                try {
                    let jsonStr = LZString.decompressFromEncodedURIComponent(dataStr);

                    // Fallback for legacy Base64 data
                    if (!jsonStr) {
                        try {
                            jsonStr = decodeURIComponent(escape(atob(dataStr)));
                        } catch (e) {
                            jsonStr = null;
                        }
                    }

                    if (jsonStr) {
                        const data = JSON.parse(jsonStr);

                        // Clear hash to avoid repeated prompts on refresh
                        window.history.replaceState(null, null, window.location.pathname);

                        if (confirm(t('syncConfirm'))) {
                            processImport(data);
                        }
                    }
                } catch (err) {
                    console.error('Failed to parse hash data', err);
                }
            }
        }

        // ==================== CARD GENERATION ====================
        async function generateCard() {
            const agentName = document.getElementById('agent-name-input').value.trim() || 'UNKNOWN AGENT';
            const theme = document.getElementById('card-theme-select').value;

            // Populate template
            const template = document.getElementById('card-template');
            template.className = theme;
            document.getElementById('ct-agent').textContent = agentName;

            const total = userData.globalTotal || 0;
            document.getElementById('ct-score').textContent = total.toLocaleString();

            let earnedTier = [...TIERS].reverse().find(t => total >= t.value);
            const badgeImg = document.getElementById('ct-badge');
            const congratsMsg = document.getElementById('ct-congrats');
            
            let imgLoadPromise = Promise.resolve();

            if (earnedTier) {
                badgeImg.src = `static/orion/${earnedTier.name.toLowerCase()}.png`;
                badgeImg.style.display = 'block';
                congratsMsg.textContent = t('congratsCardMsg')(earnedTier.name);
                congratsMsg.style.display = 'block';
                
                imgLoadPromise = new Promise((resolve) => {
                    badgeImg.onload = resolve;
                    badgeImg.onerror = resolve; // Continue even if image fails
                });
            } else {
                badgeImg.style.display = 'none';
                congratsMsg.style.display = 'none';
            }

            // Calculate specific stats with planned data
            let stats = {
                ifs: { a: 0, p: 0 },
                bounties: { a: 0, p: 0 },
                events: { a: 0, p: 0 },
                anomaly: { a: userData.activities['anomaly']?.actual || 0, p: userData.activities['anomaly']?.planned || 0 }
            };

            ACTIVITIES.forEach(act => {
                const actual = userData.activities[act.id]?.actual || 0;
                const planned = userData.activities[act.id]?.planned || 0;

                if (act.id.startsWith('ifs')) {
                    stats.ifs.a += actual;
                    stats.ifs.p += planned;
                } else if (act.isBounty) {
                    stats.bounties.p = act.max; // Use maximum possible tokens for percentage
                } else if (act.id !== 'anomaly') {
                    stats.events.a += actual;
                    stats.events.p += planned;
                }
            });

            let otherActualSum = stats.ifs.a + stats.events.a + stats.anomaly.a;
            stats.bounties.a = Math.max(0, total - otherActualSum);

            function formatStatHTML(a, p, isBounty=false) {
                if (p > 0) {
                    const pct = Math.round((a / p) * 100);
                    const pctText = isBounty ? t('bountyComplete')(pct) : t('pctComplete')(pct);
                    return `${a.toLocaleString()}<div class="stat-pct">${pctText}</div>`;
                }
                return a.toLocaleString();
            }

            document.getElementById('ct-bounties').innerHTML = formatStatHTML(stats.bounties.a, stats.bounties.p, true);
            document.getElementById('ct-ifs').innerHTML = formatStatHTML(stats.ifs.a, stats.ifs.p);
            document.getElementById('ct-events').innerHTML = formatStatHTML(stats.events.a, stats.events.p);
            document.getElementById('ct-anomaly').innerHTML = formatStatHTML(stats.anomaly.a, stats.anomaly.p);

            // Render
            const btn = document.getElementById('btn-generate-card');
            const originalText = btn.querySelector('span').textContent;
            btn.querySelector('span').textContent = '...';
            btn.disabled = true;

            try {
                // Wait for badge image to fully load
                await imgLoadPromise;
                // Small delay to ensure DOM updates are flushed before canvas reads it
                await new Promise(r => setTimeout(r, 50));
                const canvas = await html2canvas(template, {
                    scale: 2, // High resolution
                    backgroundColor: null,
                    logging: false,
                    useCORS: true // Ensure images (badges) load
                });

                const imgData = canvas.toDataURL('image/png');
                const container = document.getElementById('card-preview-container');
                container.innerHTML = `<img src="${imgData}" alt="Orion Card">`;

                document.getElementById('cardModal').style.display = 'block';
            } catch (err) {
                console.error("Card generation failed", err);
                alert("Generation failed. Please try again.");
            } finally {
                btn.querySelector('span').textContent = originalText;
                btn.disabled = false;
            }
        }

        function processImport(data) {
            if (data && (data.allSeasons || data.planner)) {
                // Handle multi-season format (v4+)
                if (data.allSeasons) {
                    allSeasonsData = data.allSeasons;
                }
                // Handle legacy single-season format
                else if (data.planner) {
                    const sid = data.seasonId || CURRENT_SEASON_ID;
                    if (sid !== CURRENT_SEASON_ID) {
                        if (!confirm(t('wrongSeason')(sid))) return;
                    }
                    allSeasonsData[sid] = data.planner;
                }

                if (data.lang && I18N[data.lang]) {
                    currentLang = data.lang;
                    localStorage.setItem('ingress_orion_lang', currentLang);
                }

                localStorage.setItem(GLOBAL_STORAGE_KEY, JSON.stringify(allSeasonsData));
                userData = allSeasonsData[CURRENT_SEASON_ID] || { globalTotal: 0, activities: {} };

                // Update UI
                document.getElementById('global-total-actual').value = userData.globalTotal || 0;
                applyLanguage();
                alert(t('importSuccess'));
            } else {
                alert(t('invalidData'));
            }
        }

        init();
    </script>
</body>
