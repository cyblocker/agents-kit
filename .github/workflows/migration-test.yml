name: Ingress Season Transition & Migration E2E Tests

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Agents Kit (New Site)
        uses: actions/checkout@v4

      - name: Checkout Legacy Site
        uses: actions/checkout@v4
        with:
          repository: cyblocker/cyblocker.github.io
          path: legacy-site

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install
          npm install -D @tailwindcss/oxide-linux-x64-gnu
          npm install -D @playwright/test serve
          npx playwright install --with-deps chromium

      - name: Build project
        run: |
          npm run build

      - name: Run E2E Tests
        run: |
          npx playwright test
